name: release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-to-pypi:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/cutemarkets/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches package version
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version_file = Path("src/cutemarkets/_version.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__\s*=\s*"([^"]+)"', version_file, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find __version__ in src/cutemarkets/_version.py")
          version = match.group(1)

          tag = str(os.environ["GIT_TAG"])
          normalized_tag = tag[1:] if tag.startswith("v") else tag
          if normalized_tag != version:
              raise SystemExit(f"Tag {tag!r} does not match package version {version!r}")
          print(f"Validated tag {tag} against package version {version}")
          PY

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check built distributions
        run: python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
